llm:
  model: "gpt-4o"
  temperature: 0.0
  max_tokens: 4096
  seed: 42
  top_p: 1.0

docker:
  image: "pypkg-audit-ptc-agent:latest"
  container_name: "pypkg-audit-ptc-agent-sandbox"
  auto_remove: false
  network_mode: "bridge"

mcp:
  servers:
    - name: "nvd"
      description: "NVD CVE API server"
      command: "uv"
      args: ["run", "python", "-m", "src.mcp_servers.nvd"]
      env: {}
      tool_exposure_mode: "summary"
    - name: "pypi"
      description: "PyPI package metadata server"
      command: "uv"
      args: ["run", "python", "-m", "src.mcp_servers.pypi"]
      env: {}
      tool_exposure_mode: "summary"
    - name: "github_api"
      description: "GitHub API server"
      command: "uv"
      args: ["run", "python", "-m", "src.mcp_servers.github_api"]
      env:
        GITHUB_TOKEN: "${GITHUB_TOKEN}"
      tool_exposure_mode: "summary"
    - name: "epss"
      description: "FIRST EPSS exploit probability scores"
      command: "uv"
      args: ["run", "python", "-m", "src.mcp_servers.epss"]
      env: {}
      tool_exposure_mode: "summary"
    - name: "osv"
      description: "OSV vulnerability database"
      command: "uv"
      args: ["run", "python", "-m", "src.mcp_servers.osv"]
      env: {}
      tool_exposure_mode: "summary"
    - name: "deps_dev"
      description: "deps.dev dependency and advisory info"
      command: "uv"
      args: ["run", "python", "-m", "src.mcp_servers.deps_dev"]
      env: {}
      tool_exposure_mode: "summary"
    - name: "scorecard"
      description: "OpenSSF Security Scorecard"
      command: "uv"
      args: ["run", "python", "-m", "src.mcp_servers.scorecard"]
      env: {}
      tool_exposure_mode: "summary"
  tool_discovery_enabled: true
  lazy_load: true
  tool_exposure_mode: "summary"

runtime:
  max_run_seconds: 240
  quality_report_enabled: true
